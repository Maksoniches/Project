<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Maker</title>
    <style>
        :root {
            --bg-black: #050505;
            --blood-red: #8b0000;
            --bright-red: #ff0000;
            --text-gray: #d1d1d1;
            --success-green: #22c55e;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle, #1a0000 0%, #050505 100%);
            color: var(--text-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(10, 10, 10, 0.95);
            padding: 2.5rem;
            border: 2px solid var(--blood-red);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.4);
            width: 90%;
            max-width: 600px;
        }

        h1, h2 { text-align: center; color: var(--bright-red); margin-bottom: 20px; }
        .hidden { display: none; }

        .btn {
            background: var(--blood-red);
            color: white;
            border: 1px solid var(--bright-red);
            padding: 14px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--bright-red); }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid var(--blood-red);
            color: white;
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 5px;
        }

        .checkbox-custom { accent-color: var(--bright-red); width: 22px; height: 22px; cursor: pointer; }

        /* Итоговый экран */
        .result-item { margin-bottom: 15px; padding: 15px; border-bottom: 1px solid #222; }
        .text-correct { color: var(--success-green); }
        .text-wrong { color: var(--bright-red); }
        .percentage { font-size: 3.5rem; text-align: center; color: var(--bright-red); margin: 20px 0; font-weight: bold; }
        
        #link-output { 
            word-break: break-all; 
            background: #000; 
            padding: 15px; 
            border: 1px dashed var(--blood-red); 
            color: var(--bright-red);
            margin: 15px 0;
            font-family: monospace;
        }

        /* Мини-плеер */
        #audio-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--blood-red);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }
        #audio-player span { font-size: 12px; color: var(--bright-red); }
        #volume-slider { cursor: pointer; accent-color: var(--bright-red); }
    </style>
</head>
<body>

<div id="audio-player">
    <span>SH3 OST</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.2">
</div>

<div class="container" id="app">
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="screen-welcome">
        <h1>Конструктор тестов</h1>
        <button class="btn" onclick="startApp()">Начать</button>
    </div>

    <div id="screen-editor" class="hidden">
        <h2 id="q-counter">Вопрос №1</h2>
        <input type="text" id="q-text" placeholder="Введите вопрос">
        <div id="options-container"></div>
        <button class="btn" onclick="addOptionField()">+ Вариант ответа</button>
        <button class="btn" onclick="saveQuestion()">Далее</button>
        <button class="btn" style="margin-top: 30px; background: #333;" onclick="finishQuiz()">Создать ссылку</button>
    </div>

    <div id="screen-link" class="hidden">
        <h2>Ссылка создана</h2>
        <div id="link-output"></div>
        <button class="btn" onclick="copyLink()">Копировать ссылку</button>
        <button class="btn" style="background: #111;" onclick="location.href=location.pathname">На главную</button>
    </div>

    <div id="screen-quiz" class="hidden">
        <h2 id="display-q-text"></h2>
        <div id="display-options"></div>
    </div>

    <div id="screen-result" class="hidden">
        <h1>Итоги</h1>
        <div class="percentage" id="perc-output">0%</div>
        <div id="error-list"></div>
        <button class="btn" onclick="location.href=location.pathname">Создать свой тест</button>
    </div>
</div>

<script>
    let questions = [];
    let currentQuizData = [];
    let userAnswers = [];
    let currentStep = 0;
    
    const music = document.getElementById('bg-music');
    const volumeSlider = document.getElementById('volume-slider');

    // Настройка звука
    music.volume = 0.2;
    volumeSlider.addEventListener('input', (e) => {
        music.volume = e.target.value;
    });

    // Корректное кодирование кириллицы для URL
    function encodeData(obj) {
        return btoa(encodeURIComponent(JSON.stringify(obj)).replace(/%([0-9A-F]{2})/g, (match, p1) => {
            return String.fromCharCode('0x' + p1);
        }));
    }

    function decodeData(str) {
        return JSON.parse(decodeURIComponent(atob(str).split('').map((c) => {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join('')));
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('data')) {
            document.getElementById('screen-welcome').classList.add('hidden');
            try {
                currentQuizData = decodeData(urlParams.get('data'));
                startQuiz();
            } catch (e) {
                alert("Ошибка чтения данных. Ссылка повреждена.");
                console.error(e);
            }
        }
    };

    function startApp() {
        music.play().catch(() => {});
        showScreen('editor');
    }

    function showScreen(id) {
        document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-' + id).classList.remove('hidden');
        if(id === 'editor' && !document.getElementById('options-container').children.length) {
            addOptionField(); addOptionField();
        }
    }

    function addOptionField() {
        const div = document.createElement('div');
        div.className = 'option-row';
        div.innerHTML = `<input type="checkbox" class="checkbox-custom"><input type="text" class="opt-text" placeholder="Вариант ответа">`;
        document.getElementById('options-container').appendChild(div);
    }

    function saveQuestion() {
        const qText = document.getElementById('q-text').value;
        const rows = document.querySelectorAll('.option-row');
        let opts = [];
        let hasCorrect = false;

        rows.forEach(row => {
            const text = row.querySelector('.opt-text').value;
            const isCorrect = row.querySelector('.checkbox-custom').checked;
            if(text) {
                opts.push({ text, isCorrect });
                if(isCorrect) hasCorrect = true;
            }
        });

        if (!qText || opts.length < 2) return alert("Введите вопрос и минимум 2 ответа");
        if (!hasCorrect) return alert("Выберите правильный ответ!");

        questions.push({ qText, opts });
        document.getElementById('q-text').value = '';
        document.getElementById('options-container').innerHTML = '';
        addOptionField(); addOptionField();
        document.getElementById('q-counter').innerText = `Вопрос №${questions.length + 1}`;
    }

    function finishQuiz() {
        if (document.getElementById('q-text').value) {
            const rows = document.querySelectorAll('.option-row');
            let hasCorrect = false;
            rows.forEach(row => { if(row.querySelector('.checkbox-custom').checked) hasCorrect = true; });
            if (!hasCorrect) return alert("В последнем вопросе не выбран правильный ответ!");
            saveQuestion();
        }
        
        if (!questions.length) return alert("Добавьте хотя бы один вопрос");

        const link = window.location.origin + window.location.pathname + '?data=' + encodeData(questions);
        document.getElementById('link-output').innerText = link;
        showScreen('link');
    }

    function startQuiz() {
        music.play().catch(() => {});
        showScreen('quiz');
        renderStep();
    }

    function renderStep() {
        const step = currentQuizData[currentStep];
        document.getElementById('display-q-text').innerText = step.qText;
        const container = document.getElementById('display-options');
        container.innerHTML = '';

        step.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.background = '#111';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(idx, btn) {
        const step = currentQuizData[currentStep];
        const buttons = document.getElementById('display-options').querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        const isCorrect = step.opts[idx].isCorrect;
        userAnswers.push({
            question: step.qText,
            userChoice: step.opts[idx].text,
            correctChoice: step.opts.find(o => o.isCorrect).text,
            wasRight: isCorrect
        });

        btn.style.backgroundColor = isCorrect ? '#22c55e' : '#ff0000';

        setTimeout(() => {
            currentStep++;
            if (currentStep < currentQuizData.length) renderStep();
            else showFinalResult();
        }, 800);
    }

    function showFinalResult() {
        showScreen('result');
        const correctCount = userAnswers.filter(a => a.wasRight).length;
        const percent = Math.round((correctCount / userAnswers.length) * 100);
        document.getElementById('perc-output').innerText = percent + '%';

        const list = document.getElementById('error-list');
        list.innerHTML = '<h3>Детали:</h3>';
        userAnswers.forEach(a => {
            list.innerHTML += `
                <div class="result-item">
                    <div><b>Вопрос:</b> ${a.question}</div>
                    <div class="${a.wasRight ? 'text-correct' : 'text-wrong'}">
                        <b>Ваш ответ:</b> ${a.userChoice}
                    </div>
                    ${!a.wasRight ? `<div class="text-correct"><b>Верно:</b> ${a.correctChoice}</div>` : ''}
                </div>`;
        });
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('link-output').innerText);
        alert("Скопировано!");
    }
</script>

</body>
</html>
