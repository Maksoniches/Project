<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Quiz Maker</title>
    <style>
        :root {
            --bg-black: #050505;
            --blood-red: #8b0000;
            --bright-red: #ff0000;
            --text-gray: #d1d1d1;
            --success-green: #22c55e;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle, #1a0000 0%, #050505 100%);
            color: var(--text-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: rgba(10, 10, 10, 0.9);
            padding: 2.5rem;
            border: 2px solid var(--blood-red);
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        h1, h2 { 
            text-align: center; 
            color: var(--bright-red); 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 2px 2px 5px black;
        }

        .hidden { display: none; }

        /* Элементы управления */
        .btn {
            background: var(--blood-red);
            color: white;
            border: 1px solid var(--bright-red);
            padding: 12px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn:hover { background: var(--bright-red); box-shadow: 0 0 10px var(--bright-red); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid var(--blood-red);
            color: white;
            outline: none;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 5px;
            border-left: 3px solid var(--blood-red);
        }

        /* Результаты */
        .result-item {
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .text-correct { color: var(--success-green); font-weight: bold; }
        .text-wrong { color: var(--bright-red); font-weight: bold; }

        .percentage {
            font-size: 3rem;
            text-align: center;
            color: var(--bright-red);
            margin: 20px 0;
        }

        /* Кастомный чекбокс */
        .checkbox-custom { accent-color: var(--bright-red); width: 20px; height: 20px; }

        #audio-controls {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Скрытый аудиоплеер с твоим файлом -->
<audio id="bg-music" loop>
    <source src="silent_hill_3_Akira Yamaoka - End of Small Sanctuary.mp3" type="audio/mpeg">
</audio>

    <!-- Приветственный экран (только если нет данных в URL) -->
    <div id="screen-welcome">
        <h1>Sugar Quiz</h1>
        <button class="btn" onclick="startApp()">Войти в систему</button>
    </div>

    <!-- Редактор -->
    <div id="screen-editor" class="hidden">
        <h2 id="q-counter">Вопрос №1</h2>
        <input type="text" id="q-text" placeholder="ТЕКСТ ВОПРОСА...">
        <div id="options-container"></div>
        <button class="btn" onclick="addOptionField()">+ ДОБАВИТЬ ВАРИАНТ</button>
        <button class="btn" onclick="saveQuestion()">СЛЕДУЮЩИЙ ВОПРОС</button>
        <button class="btn" style="margin-top: 40px; border-style: dashed;" onclick="finishQuiz()">СОЗДАТЬ ТЕСТ</button>
    </div>

    <!-- Экран ссылки -->
    <div id="screen-link" class="hidden">
        <h2>ТЕСТ СФОРМИРОВАН</h2>
        <p style="text-align: center;">Пусти это по венам (скопируй ссылку):</p>
        <div id="link-output" style="word-break: break-all; background: #111; padding: 10px; border: 1px solid var(--blood-red); color: var(--bright-red);"></div>
        <button class="btn" onclick="copyLink()">КОПИРОВАТЬ ССЫЛКУ</button>
    </div>

    <!-- Прохождение теста -->
    <div id="screen-quiz" class="hidden">
        <h2 id="display-q-text"></h2>
        <div id="display-options"></div>
    </div>

    <!-- Итоговый отчет -->
    <div id="screen-result" class="hidden">
        <h1>АНАЛИЗ КРОВИ</h1>
        <div class="percentage" id="perc-output">0%</div>
        <div id="error-list"></div>
        <button class="btn" onclick="location.href=location.pathname">НОВЫЙ ТЕСТ</button>
    </div>
</div>

<script>
    let questions = [];
    let currentQuizData = [];
    let userAnswers = [];
    let currentStep = 0;
    const music = document.getElementById('bg-music');

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('data')) {
            // Если есть данные, убираем приветствие и сразу запускаем тест
            document.getElementById('screen-welcome').classList.add('hidden');
            try {
                currentQuizData = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data')))));
                startQuiz();
            } catch (e) { alert("Ошибка данных"); }
        }
    };

    function startApp() {
        music.play().catch(() => console.log("Музыка ждет взаимодействия"));
        showScreen('editor');
    }

    function showScreen(id) {
        document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-' + id).classList.remove('hidden');
        if(id === 'editor' && !document.getElementById('options-container').children.length) {
            addOptionField(); addOptionField();
        }
    }

    function addOptionField() {
        const div = document.createElement('div');
        div.className = 'option-row';
        div.innerHTML = `<input type="checkbox" class="checkbox-custom"><input type="text" class="opt-text" placeholder="Ответ...">`;
        document.getElementById('options-container').appendChild(div);
    }

    function saveQuestion() {
        const qText = document.getElementById('q-text').value;
        const rows = document.querySelectorAll('.option-row');
        let opts = [];
        let hasCorrect = false;

        rows.forEach(row => {
            const text = row.querySelector('.opt-text').value;
            const isCorrect = row.querySelector('.checkbox-custom').checked;
            if(text) {
                opts.push({ text, isCorrect });
                if(isCorrect) hasCorrect = true;
            }
        });

        if (!qText || opts.length < 2) return alert("Нужен вопрос и минимум 2 ответа!");
        if (!hasCorrect) return alert("ОТМЕТЬ ХОТЯ БЫ ОДИН ПРАВИЛЬНЫЙ ОТВЕТ ГАЛОЧКОЙ!");

        questions.push({ qText, opts });
        document.getElementById('q-text').value = '';
        document.getElementById('options-container').innerHTML = '';
        addOptionField(); addOptionField();
        document.getElementById('q-counter').innerText = `Вопрос №${questions.length + 1}`;
    }

    function finishQuiz() {
        if (document.getElementById('q-text').value) saveQuestion();
        if (!questions.length) return;
        const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(questions))));
        const link = window.location.origin + window.location.pathname + '?data=' + base64;
        document.getElementById('link-output').innerText = link;
        showScreen('link');
    }

    function startQuiz() {
        music.play().catch(() => {});
        showScreen('quiz');
        renderStep();
    }

    function renderStep() {
        const step = currentQuizData[currentStep];
        document.getElementById('display-q-text').innerText = step.qText;
        const container = document.getElementById('display-options');
        container.innerHTML = '';

        step.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.background = '#111';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(idx, btn) {
        const step = currentQuizData[currentStep];
        const buttons = document.getElementById('display-options').querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        const isCorrect = step.opts[idx].isCorrect;
        userAnswers.push({
            question: step.qText,
            userChoice: step.opts[idx].text,
            correctChoice: step.opts.find(o => o.isCorrect).text,
            wasRight: isCorrect
        });

        btn.style.backgroundColor = isCorrect ? '#22c55e' : '#ff0000';
        btn.style.boxShadow = isCorrect ? '0 0 15px #22c55e' : '0 0 15px #ff0000';

        setTimeout(() => {
            currentStep++;
            if (currentStep < currentQuizData.length) renderStep();
            else showFinalResult();
        }, 1000);
    }

    function showFinalResult() {
        showScreen('result');
        const correctCount = userAnswers.filter(a => a.wasRight).length;
        const percent = Math.round((correctCount / userAnswers.length) * 100);
        document.getElementById('perc-output').innerText = percent + '%';

        const list = document.getElementById('error-list');
        list.innerHTML = '<h3>ДЕТАЛИЗАЦИЯ:</h3>';
        userAnswers.forEach(a => {
            list.innerHTML += `
                <div class="result-item">
                    <div><b>Вопрос:</b> ${a.question}</div>
                    <div class="${a.wasRight ? 'text-correct' : 'text-wrong'}">
                        <b>Твой ответ:</b> ${a.userChoice}
                    </div>
                    ${!a.wasRight ? `<div class="text-correct"><b>Верно:</b> ${a.correctChoice}</div>` : ''}
                </div>`;
        });
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('link-output').innerText);
        alert("Ссылка в буфере");
    }
</script>

</body>
</html>
