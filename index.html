<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Maker</title>
    <style>
        :root {
            --bg-black: #050505;
            --blood-red: #8b0000;
            --bright-red: #ff0000;
            --text-gray: #d1d1d1;
            --success-green: #22c55e;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle, #1a0000 0%, #050505 100%);
            color: var(--text-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(10, 10, 10, 0.95);
            padding: 2.5rem;
            border: 2px solid var(--blood-red);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
        }

        h1, h2 { text-align: center; color: var(--bright-red); letter-spacing: 1px; }

        .hidden { display: none; }

        .btn {
            background: var(--blood-red);
            color: white;
            border: 1px solid var(--bright-red);
            padding: 14px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--bright-red); }
        .btn:disabled { opacity: 0.5; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid var(--blood-red);
            color: white;
            border-radius: 5px;
            outline: none;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 5px;
        }

        .checkbox-custom { accent-color: var(--bright-red); width: 22px; height: 22px; cursor: pointer; }

        .result-item { margin-bottom: 15px; padding: 15px; border-bottom: 1px solid #222; }
        .text-correct { color: var(--success-green); }
        .text-wrong { color: var(--bright-red); }
        .percentage { font-size: 3.5rem; text-align: center; color: var(--bright-red); margin: 20px 0; font-weight: bold; }
        
        #link-output { 
            word-break: break-all; 
            background: #000; 
            padding: 15px; 
            border: 1px dashed var(--blood-red); 
            color: var(--bright-red);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Музыка теперь ссылается на song.mp3 -->
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="screen-welcome">
        <h1>Конструктор тестов</h1>
        <button class="btn" onclick="startApp()">Начать работу</button>
    </div>

    <div id="screen-editor" class="hidden">
        <h2 id="q-counter">Вопрос №1</h2>
        <input type="text" id="q-text" placeholder="Введите ваш вопрос">
        <div id="options-container"></div>
        <button class="btn" onclick="addOptionField()">+ Добавить вариант</button>
        <button class="btn" onclick="saveQuestion()">Следующий вопрос</button>
        <button class="btn" style="margin-top: 30px; background: #333;" onclick="finishQuiz()">Завершить и создать ссылку</button>
    </div>

    <div id="screen-link" class="hidden">
        <h2>Ссылка готова</h2>
        <div id="link-output"></div>
        <button class="btn" onclick="copyLink()">Копировать в буфер</button>
        <button class="btn" style="background: #111;" onclick="location.href=location.pathname">Создать еще один</button>
    </div>

    <div id="screen-quiz" class="hidden">
        <h2 id="display-q-text"></h2>
        <div id="display-options"></div>
    </div>

    <div id="screen-result" class="hidden">
        <h1>Результаты теста</h1>
        <div class="percentage" id="perc-output">0%</div>
        <div id="error-list"></div>
        <button class="btn" onclick="location.href=location.pathname">Создать свой тест</button>
    </div>
</div>

<script>
    let questions = [];
    let currentQuizData = [];
    let userAnswers = [];
    let currentStep = 0;
    const music = document.getElementById('bg-music');

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('data')) {
            document.getElementById('screen-welcome').classList.add('hidden');
            try {
                currentQuizData = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data')))));
                startQuiz();
            } catch (e) { alert("Ошибка при чтении данных теста"); }
        }
    };

    function startApp() {
        music.play().catch(() => {});
        showScreen('editor');
    }

    function showScreen(id) {
        document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-' + id).classList.remove('hidden');
        if(id === 'editor' && !document.getElementById('options-container').children.length) {
            addOptionField(); addOptionField();
        }
    }

    function addOptionField() {
        const div = document.createElement('div');
        div.className = 'option-row';
        div.innerHTML = `<input type="checkbox" class="checkbox-custom"><input type="text" class="opt-text" placeholder="Вариант ответа">`;
        document.getElementById('options-container').appendChild(div);
    }

    // ИСПРАВЛЕННАЯ ЛОГИКА СОХРАНЕНИЯ
    function saveQuestion() {
        const qText = document.getElementById('q-text').value;
        const rows = document.querySelectorAll('.option-row');
        let opts = [];
        let hasCorrect = false;

        rows.forEach(row => {
            const text = row.querySelector('.opt-text').value;
            const isCorrect = row.querySelector('.checkbox-custom').checked;
            if(text) {
                opts.push({ text, isCorrect });
                if(isCorrect) hasCorrect = true;
            }
        });

        if (!qText || opts.length < 2) {
            alert("Пожалуйста, введите вопрос и хотя бы два варианта ответа.");
            return;
        }
        if (!hasCorrect) {
            alert("Нужно отметить галочкой хотя бы один правильный ответ!");
            return; // Теперь он не пропустит дальше
        }

        questions.push({ qText, opts });
        
        // Очистка полей
        document.getElementById('q-text').value = '';
        document.getElementById('options-container').innerHTML = '';
        addOptionField(); addOptionField();
        document.getElementById('q-counter').innerText = `Вопрос №${questions.length + 1}`;
    }

    function finishQuiz() {
        const qText = document.getElementById('q-text').value;
        // Если в поле что-то введено, пытаемся сохранить последний вопрос
        if (qText) {
            const rows = document.querySelectorAll('.option-row');
            let hasCorrect = false;
            rows.forEach(row => { if(row.querySelector('.checkbox-custom').checked) hasCorrect = true; });
            
            if (!hasCorrect) {
                alert("В последнем вопросе не отмечен правильный ответ!");
                return;
            }
            saveQuestion();
        }
        
        if (!questions.length) {
            alert("Вы не добавили ни одного вопроса.");
            return;
        }

        const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(questions))));
        const link = window.location.origin + window.location.pathname + '?data=' + base64;
        document.getElementById('link-output').innerText = link;
        showScreen('link');
    }

    function startQuiz() {
        music.play().catch(() => {});
        showScreen('quiz');
        renderStep();
    }

    function renderStep() {
        const step = currentQuizData[currentStep];
        document.getElementById('display-q-text').innerText = step.qText;
        const container = document.getElementById('display-options');
        container.innerHTML = '';

        step.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.background = '#111';
            btn.style.textAlign = 'left';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(idx, btn) {
        const step = currentQuizData[currentStep];
        const buttons = document.getElementById('display-options').querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        const isCorrect = step.opts[idx].isCorrect;
        userAnswers.push({
            question: step.qText,
            userChoice: step.opts[idx].text,
            correctChoice: step.opts.find(o => o.isCorrect).text,
            wasRight: isCorrect
        });

        btn.style.backgroundColor = isCorrect ? '#22c55e' : '#ff0000';
        btn.style.borderColor = isCorrect ? '#22c55e' : '#ff0000';

        setTimeout(() => {
            currentStep++;
            if (currentStep < currentQuizData.length) renderStep();
            else showFinalResult();
        }, 800);
    }

    function showFinalResult() {
        showScreen('result');
        const correctCount = userAnswers.filter(a => a.wasRight).length;
        const percent = Math.round((correctCount / userAnswers.length) * 100);
        document.getElementById('perc-output').innerText = percent + '%';

        const list = document.getElementById('error-list');
        list.innerHTML = '<h3>Детали теста:</h3>';
        userAnswers.forEach(a => {
            list.innerHTML += `
                <div class="result-item">
                    <div><b>Вопрос:</b> ${a.question}</div>
                    <div class="${a.wasRight ? 'text-correct' : 'text-wrong'}">
                        <b>Ваш ответ:</b> ${a.userChoice}
                    </div>
                    ${!a.wasRight ? `<div class="text-correct"><b>Правильно:</b> ${a.correctChoice}</div>` : ''}
                </div>`;
        });
    }

    function copyLink() {
        const text = document.getElementById('link-output').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Ссылка скопирована!"));
    }
</script>

</body>
</html>
