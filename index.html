<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Quiz Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root {
            --bg: #050505; --red: #8b0000; --bright: #ff0000; --gray: #d1d1d1; --green: #22c55e;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--gray);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
        }

        /* --- МОДУЛЬ: ВИЗУАЛ (ДОЖДЬ) --- */
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .drop { position: absolute; background: rgba(255, 255, 255, 0.08); width: 1px; height: 40px; top: -100px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* --- МОДУЛЬ: ИНТЕРФЕЙС --- */
        .container {
            background: rgba(10, 10, 10, 0.9); padding: 25px; border: 1px solid var(--red);
            border-radius: 8px; box-shadow: 0 0 20px rgba(139, 0, 0, 0.2);
            width: 95%; max-width: 550px; position: relative; z-index: 10;
            max-height: 85vh; overflow-y: auto;
        }

        .hidden { display: none; }
        h1, h2 { text-align: center; color: var(--bright); text-transform: uppercase; font-size: 1.4rem; }
        
        .btn {
            background: var(--red); color: white; border: 1px solid var(--bright);
            padding: 12px; cursor: pointer; width: 100%; margin-top: 8px;
            border-radius: 4px; transition: 0.2s; font-weight: bold;
        }
        .btn:hover { background: var(--bright); }
        .btn-alt { background: #1a1a1a; border-color: #333; }

        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px; margin: 8px 0; background: #000;
            border: 1px solid var(--red); color: #fff; border-radius: 4px; box-sizing: border-box;
        }

        .option-row { display: flex; align-items: center; gap: 8px; background: #111; padding: 5px; margin-bottom: 5px; border-radius: 4px; }
        .img-preview { max-width: 100%; margin: 10px 0; border: 1px solid var(--red); display: block; }

        /* Таблица оценок */
        .grade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 15px 0; }
        .grade-box { text-align: center; font-size: 12px; border: 1px solid #333; padding: 5px; }

        /* Плеер */
        #player-ui {
            position: fixed; bottom: 15px; right: 15px; background: #000;
            border: 1px solid var(--red); padding: 8px; border-radius: 4px; z-index: 100;
        }
    </style>
</head>
<body>

<div class="rain" id="rain"></div>

<div id="player-ui">
    <span style="font-size: 10px; color: var(--bright);">MUSIC</span>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="0.2" style="width: 60px; accent-color: var(--bright);">
</div>

<div class="container" id="app">
    <audio id="track" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <div id="scr-start">
        <h1>Quiz Construction</h1>
        <button class="btn" onclick="Core.init()">Создать новый</button>
    </div>

    <div id="scr-edit" class="hidden">
        <h2 id="q-num">Вопрос №1</h2>
        
        <div style="display: flex; gap: 5px;">
            <button class="btn btn-alt" onclick="Editor.setType('multi')">Варианты</button>
            <button class="btn btn-alt" onclick="Editor.setType('text')">Текст</button>
        </div>

        <input type="text" id="q-val" placeholder="Вопрос...">
        
        <div style="background: #111; padding: 10px; margin: 10px 0;">
            <label style="font-size: 11px;">Медиа (макс. 100КБ):</label>
            <input type="file" id="q-img" accept="image/*" onchange="Editor.handleImg(this)">
            <img id="p-img" class="img-preview hidden">
        </div>

        <div id="opt-wrap"></div>
        <button class="btn btn-alt" id="add-opt" onclick="Editor.addOpt()">+ Добавить вариант</button>
        <button class="btn" onclick="Editor.saveQ()">Следующий вопрос</button>
        
        <div style="margin-top: 20px; border-top: 1px solid var(--red); pt: 10px;">
            <p style="font-size: 11px; margin-bottom: 5px;">Пороги оценок (% успеха):</p>
            <div class="grade-grid">
                <div class="grade-box">5: <input type="number" id="c5" value="90"></div>
                <div class="grade-box">4: <input type="number" id="c4" value="70"></div>
                <div class="grade-box">3: <input type="number" id="c3" value="50"></div>
                <div class="grade-box">2: <input type="number" id="c2" value="0"></div>
            </div>
            <button class="btn" style="background: #222;" onclick="Core.generate()">Сгенерировать ссылку</button>
        </div>
    </div>

    <div id="scr-link" class="hidden">
        <h2>Тест готов</h2>
        <div id="out-link" style="background: #000; padding: 10px; border: 1px dashed var(--red); font-size: 11px; word-break: break-all;"></div>
        <button class="btn" onclick="Core.copy()">Копировать ссылку</button>
    </div>

    <div id="scr-quiz" class="hidden">
        <div id="q-media"></div>
        <h2 id="q-disp"></h2>
        <div id="q-opts"></div>
        <div id="q-text-input" class="hidden">
            <input type="text" id="user-txt" placeholder="Ответ...">
            <button class="btn" onclick="Quiz.sendTxt()">Ответить</button>
        </div>
    </div>

    <div id="scr-res" class="hidden">
        <h1 id="res-perc">0%</h1>
        <h2 id="res-grade"></h2>
        <div id="res-det"></div>
        <button class="btn" onclick="location.href=location.pathname">На главную</button>
    </div>
</div>

<script>
/* --- МОДУЛЬ: СИСТЕМА --- */
const Core = {
    data: [],
    criteria: {},
    
    init() {
        Sound.play();
        UI.show('edit');
        Editor.setType('multi');
    },

    generate() {
        if (document.getElementById('q-val').value) Editor.saveQ();
        if (!this.data.length) return alert("Добавьте вопросы!");
        
        this.criteria = { 
            5: +document.getElementById('c5').value, 
            4: +document.getElementById('c4').value, 
            3: +document.getElementById('c3').value 
        };

        const payload = JSON.stringify({ q: this.data, c: this.criteria });
        // Сжатие данных через LZ-String
        const compressed = LZString.compressToEncodedURIComponent(payload);
        const url = window.location.origin + window.location.pathname + '?d=' + compressed;
        
        document.getElementById('out-link').innerText = url;
        UI.show('link');
    },

    copy() {
        navigator.clipboard.writeText(document.getElementById('out-link').innerText);
        alert("Ссылка в буфере!");
    }
};

/* --- МОДУЛЬ: РЕДАКТОР --- */
const Editor = {
    type: 'multi',
    img: null,

    setType(t) {
        this.type = t;
        document.getElementById('opt-wrap').innerHTML = '';
        document.getElementById('add-opt').style.display = t === 'multi' ? 'block' : 'none';
        if(t === 'multi') { this.addOpt(); this.addOpt(); }
        else {
            const i = document.createElement('input');
            i.type = 'text'; i.id = 'ans-correct'; i.placeholder = 'Правильный ответ...';
            document.getElementById('opt-wrap').appendChild(i);
        }
    },

    handleImg(el) {
        const file = el.files[0];
        if (file.size > 150000) { alert("Файл слишком большой! Лимит 150КБ."); el.value = ""; return; }
        const reader = new FileReader();
        reader.onload = (e) => {
            this.img = e.target.result;
            const p = document.getElementById('p-img');
            p.src = this.img; p.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    },

    addOpt() {
        const d = document.createElement('div');
        d.className = 'option-row';
        d.innerHTML = `<input type="checkbox"><input type="text" class="o-val" placeholder="Вариант...">`;
        document.getElementById('opt-wrap').appendChild(d);
    },

    saveQ() {
        const val = document.getElementById('q-val').value;
        if (!val) return alert("Введите вопрос");
        
        let item = { t: val, type: this.type, img: this.img };
        if (this.type === 'multi') {
            const opts = [];
            document.querySelectorAll('.option-row').forEach(r => {
                const txt = r.querySelector('.o-val').value;
                if(txt) opts.push({ txt, ok: r.querySelector('input[type="checkbox"]').checked });
            });
            if (opts.length < 2 || !opts.some(o => o.ok)) return alert("Нужны варианты и 1 верный!");
            item.opts = opts;
        } else {
            const okT = document.getElementById('ans-correct').value;
            if(!okT) return alert("Укажите ответ");
            item.okT = okT;
        }

        Core.data.push(item);
        this.img = null;
        document.getElementById('q-val').value = '';
        document.getElementById('q-img').value = '';
        document.getElementById('p-img').classList.add('hidden');
        document.getElementById('q-num').innerText = `Вопрос №${Core.data.length + 1}`;
        this.setType(this.type);
    }
};

/* --- МОДУЛЬ: ТЕСТ --- */
const Quiz = {
    step: 0,
    results: [],
    source: null,

    start(raw) {
        try {
            this.source = JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
            UI.show('quiz');
            this.render();
        } catch(e) { alert("Ошибка загрузки"); }
    },

    render() {
        const q = this.source.q[this.step];
        document.getElementById('q-disp').innerText = q.t;
        document.getElementById('q-media').innerHTML = q.img ? `<img src="${q.img}" class="img-preview">` : '';
        const oWrap = document.getElementById('q-opts');
        const tWrap = document.getElementById('q-text-input');
        
        oWrap.innerHTML = ''; tWrap.classList.add('hidden');
        if (q.type === 'multi') {
            q.opts.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'btn btn-alt'; b.innerText = o.txt;
                b.onclick = () => this.check(i, b);
                oWrap.appendChild(b);
            });
        } else {
            tWrap.classList.remove('hidden');
            document.getElementById('user-txt').value = '';
        }
    },

    check(idx, btn) {
        const q = this.source.q[this.step];
        const ok = q.opts[idx].ok;
        this.record(ok, q.opts[idx].txt, q.opts.find(o=>o.ok).txt);
        btn.style.background = ok ? 'var(--green)' : 'var(--bright)';
        setTimeout(() => this.next(), 600);
    },

    sendTxt() {
        const q = this.source.q[this.step];
        const val = document.getElementById('user-txt').value.trim().toLowerCase();
        this.record(val === q.okT.toLowerCase(), val, q.okT);
        this.next();
    },

    record(ok, u, r) { this.results.push({ q: this.source.q[this.step].t, ok, u, r }); },

    next() {
        this.step++;
        if (this.step < this.source.q.length) this.render();
        else this.finish();
    },

    finish() {
        UI.show('res');
        const win = this.results.filter(r => r.ok).length;
        const p = Math.round((win / this.results.length) * 100);
        document.getElementById('res-perc').innerText = p + '%';
        
        const c = this.source.c;
        let g = 2;
        if (p >= c[5]) g = 5; else if (p >= c[4]) g = 4; else if (p >= c[3]) g = 3;
        
        const resGrade = document.getElementById('res-grade');
        resGrade.innerText = "Оценка: " + g;
        resGrade.style.color = g > 2 ? 'var(--green)' : 'var(--bright)';
    }
};

/* --- МОДУЛЬ: ЗВУК И ИНТЕРФЕЙС --- */
const Sound = {
    el: document.getElementById('track'),
    play() { this.el.volume = 0.2; this.el.play().catch(()=>{}); }
};

document.getElementById('vol').oninput = (e) => Sound.el.volume = e.target.value;

const UI = {
    show(id) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('scr-' + id).classList.remove('hidden');
    }
};

// Запуск дождя
for (let i = 0; i < 40; i++) {
    const d = document.createElement('div'); d.className = 'drop';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
    d.style.animationDelay = Math.random() * 2 + 's';
    document.getElementById('rain').appendChild(d);
}

// Проверка входящей ссылки
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    if (params.has('d')) Quiz.start(params.get('d'));
};
</script>
</body>
</html>
